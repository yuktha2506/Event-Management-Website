<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Forgot Password</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(
                rgba(0,0,0,0.6),
                rgba(0,0,0,0.6)
            ),
            url('https://images.unsplash.com/photo-1523580846011-d3a5bc25702b') no-repeat center/cover;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
        }

        .card {
            width: 100%;
            max-width: 420px;
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 35px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            text-align: center;
        }

        h1 {
            margin-bottom: 10px;
            font-size: 2rem;
        }

        p.subtitle {
            margin-bottom: 25px;
            font-size: 0.95rem;
            opacity: 0.9;
        }

        label {
            font-size: 0.9rem;
            margin-bottom: 5px;
            display: block;
            opacity: 0.9;
            text-align: left;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            margin-bottom: 18px;
            outline: none;
            font-size: 0.95rem;
            background: rgba(255, 255, 255, 0.9);
        }

        .btn-primary {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: #00c6ff;
            color: #000;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            margin-bottom: 10px;
        }

        .btn-primary:hover {
            background: #fff;
        }

        .back-home {
            display: block;
            text-align: center;
            margin-top: 8px;
            font-size: 0.9rem;
            color: #fff;
            text-decoration: none;
            opacity: 0.85;
        }

        .back-home:hover {
            text-decoration: underline;
        }

        @media (max-width: 500px) {
            .card {
                margin: 20px;
                padding: 25px;
            }
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Forgot Password</h1>
        <p class="subtitle">Enter your registered email to receive a reset link.</p>

        <form id="forgot-password-form">
            <label>Role</label>
            <select id="role" required>
                <option value="">Select your role</option>
                <option value="student">Student</option>
                <option value="organizer">Organizer / Head</option>
            </select>

            <label>Email</label>
            <input type="email" id="email" placeholder="Registered email address" required>

            <button class="btn-primary" type="submit">Send Reset Link</button>
        </form>

        <a href="index.html" class="back-home">← Back to Home</a>
    </div>

    <script>
        document.getElementById('forgot-password-form').addEventListener('submit', function (e) {
            e.preventDefault();
            alert('If this email is registered, a reset link has been sent.');
        });
    </script>

</body>
</html>
