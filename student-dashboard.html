<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Dashboard - College Events</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(
                rgba(0,0,0,0.6),
                rgba(0,0,0,0.6)
            ),
            url('https://images.unsplash.com/photo-1524995997946-a1c2e315a42f') no-repeat center/cover;
            color: #fff;
            padding-bottom: 40px;
        }

        /* Navbar */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(6px);
        }

        .nav-links {
            display: flex;
            gap: 30px;
            margin: 0 auto;
        }

        nav a {
            color: #fff;
            text-decoration: none;
            font-weight: 500;
            padding: 8px 16px;
            border-radius: 20px;
            transition: 0.3s;
        }

        nav a:hover {
            background: #00c6ff;
            color: #000;
        }

        .logout-btn {
            background: #ff4444;
            color: #fff;
            padding: 8px 16px;
            border-radius: 20px;
            text-decoration: none;
            font-weight: 500;
            cursor: pointer;
            border: none;
            transition: 0.3s;
        }

        .logout-btn:hover {
            background: #ff0000;
        }

        /* Main Content */
        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }

        h1 {
            text-align: center;
            margin-bottom: 10px;
            font-size: 2.5rem;
        }

        .welcome-msg {
            text-align: center;
            margin-bottom: 30px;
            opacity: 0.9;
            font-size: 1.1rem;
        }

        /* Events Grid */
        .events-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
            margin-top: 30px;
        }

        .event-card {
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            transition: 0.3s;
        }

        .event-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 40px rgba(0,0,0,0.4);
            background: rgba(255, 255, 255, 0.15);
        }

        .event-card h3 {
            color: #00c6ff;
            margin-bottom: 15px;
            font-size: 1.4rem;
        }

        .event-card p {
            margin: 8px 0;
            opacity: 0.9;
            font-size: 0.95rem;
        }

        .event-card .event-info {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 8px 0;
        }

        .event-category {
            display: inline-block;
            background: #00c6ff;
            color: #000;
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 0.85rem;
            font-weight: 500;
            margin-top: 10px;
        }

        .register-btn {
            display: inline-block;
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            background: #00c6ff;
            color: #000;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 600;
            text-align: center;
            transition: 0.3s;
            border: none;
            cursor: pointer;
        }

        .register-btn:hover {
            background: #fff;
            transform: scale(1.02);
        }

        .register-btn:disabled {
            background: rgba(255, 255, 255, 0.3);
            cursor: not-allowed;
            opacity: 0.6;
        }

        .no-events {
            text-align: center;
            padding: 60px 20px;
            opacity: 0.7;
            font-size: 1.1rem;
        }

        .loading {
            text-align: center;
            padding: 40px;
            font-size: 1.1rem;
            opacity: 0.8;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .events-grid {
                grid-template-columns: 1fr;
            }

            nav {
                padding: 15px 20px;
            }

            .nav-links {
                gap: 15px;
            }

            h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>

<body>

    <nav>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="student-dashboard.html">Dashboard</a>
            <a href="events.html">All Events</a>
            <a href="contact.html">Contact</a>
        </div>
        <button class="logout-btn" id="logoutBtn">Logout</button>
    </nav>

    <div class="container">
        <h1>College Events</h1>
        <p class="welcome-msg" id="welcomeMsg">Welcome! Here are all upcoming events.</p>

        <div id="eventsContainer" class="loading">Loading events...</div>
    </div>

    <script>
        // Check if user is logged in
        if (localStorage.getItem('currentUserRole') !== 'student') {
            alert('Please login as student to access this page.');
            window.location.href = 'student-login.html';
        } else {
            // Show welcome message
            const userName = localStorage.getItem('currentUserName') || 'Student';
            document.getElementById('welcomeMsg').textContent = `Welcome, ${userName}! Here are all upcoming events.`;
        }

        // Default events (fallback)
        const defaultEvents = [
            {
                name: 'Hackathon',
                date: '2026-03-10',
                time: '09:00',
                location: 'Block 5 Lab',
                category: 'Technical',
                requiresRegistration: true
            },
            {
                name: 'Dance Battle',
                date: '2026-03-12',
                time: '18:00',
                location: 'Open Audi',
                category: 'Cultural',
                requiresRegistration: false
            },
            {
                name: 'Cricket Tournament',
                date: '2026-03-15',
                time: '08:00',
                location: 'Ground',
                category: 'Sports',
                requiresRegistration: true
            },
            {
                name: 'Basketball Tournament',
                date: '2026-03-18',
                time: '16:00',
                location: 'Ground',
                category: 'Sports',
                requiresRegistration: true
            },
            {
                name: 'Christ Kengeri League',
                date: '2026-03-20',
                time: '17:00',
                location: 'Ground',
                category: 'Sports',
                requiresRegistration: true
            },
            {
                name: 'Seminars/Talks',
                date: '2026-03-22',
                time: '11:00',
                location: 'Block 3 Audi',
                category: 'Seminars/Talks',
                requiresRegistration: true
            },
            {
                name: 'Streetplay',
                date: '2026-03-24',
                time: '13:00',
                location: 'Near Open Audi',
                category: 'Cultural',
                requiresRegistration: false
            },
            {
                name: 'Flashmob',
                date: '2026-03-26',
                time: '16:00',
                location: 'Near Open Audi',
                category: 'Cultural',
                requiresRegistration: false
            }
        ];

        // Load events from backend and localStorage
        function loadEvents() {
            const container = document.getElementById('eventsContainer');
            
            // Try to fetch from backend
            fetch('api/get_events.php')
                .then(response => response.json())
                .then(data => {
                    let events = [];
                    
                    if (data.success && data.events && data.events.length > 0) {
                        // Use backend events
                        events = data.events.map(ev => ({
                            id: ev.id,
                            name: ev.name,
                            date: ev.date,
                            time: ev.time,
                            location: ev.place,
                            category: ev.category,
                            description: ev.description || '',
                            requiresRegistration: ev.requires_registration == 1
                        }));
                    } else {
                        // Fallback to localStorage events
                        const storedEvents = localStorage.getItem('events');
                        if (storedEvents) {
                            try {
                                const parsed = JSON.parse(storedEvents);
                                events = parsed.map(ev => ({
                                    id: ev.id,
                                    name: ev.name,
                                    date: ev.date,
                                    time: ev.time,
                                    location: ev.place,
                                    category: ev.category,
                                    description: ev.description || '',
                                    requiresRegistration: ev.requiresRegistration !== false
                                }));
                            } catch (e) {
                                events = defaultEvents;
                            }
                        } else {
                            events = defaultEvents;
                        }
                    }

                    // Merge with default events if needed
                    if (events.length === 0) {
                        events = defaultEvents;
                    }

                    displayEvents(events);
                })
                .catch(error => {
                    console.log('Backend not available, using localStorage');
                    // Use localStorage events
                    const storedEvents = localStorage.getItem('events');
                    let events = [];
                    
                    if (storedEvents) {
                        try {
                            const parsed = JSON.parse(storedEvents);
                            events = parsed.map(ev => ({
                                id: ev.id,
                                name: ev.name,
                                date: ev.date,
                                time: ev.time,
                                location: ev.place,
                                category: ev.category,
                                description: ev.description || '',
                                requiresRegistration: ev.requiresRegistration !== false
                            }));
                        } catch (e) {
                            events = defaultEvents;
                        }
                    } else {
                        events = defaultEvents;
                    }

                    displayEvents(events);
                });
        }

        function displayEvents(events) {
            const container = document.getElementById('eventsContainer');
            
            if (events.length === 0) {
                container.innerHTML = '<div class="no-events">No events available at the moment. Check back later!</div>';
                return;
            }

            // Sort events by date
            events.sort((a, b) => {
                const dateA = new Date(a.date + ' ' + a.time);
                const dateB = new Date(b.date + ' ' + b.time);
                return dateA - dateB;
            });

            container.innerHTML = '<div class="events-grid">' + events.map(event => `
                <div class="event-card">
                    <h3>${event.name}</h3>
                    <div class="event-info">
                        <strong>📅 Date:</strong> ${formatDate(event.date)}
                    </div>
                    <div class="event-info">
                        <strong>🕐 Time:</strong> ${formatTime(event.time)}
                    </div>
                    <div class="event-info">
                        <strong>📍 Location:</strong> ${event.location}
                    </div>
                    ${event.description ? `<p><strong>Description:</strong> ${event.description}</p>` : ''}
                    <span class="event-category">${event.category}</span>
                    ${event.requiresRegistration 
                        ? `<a href="register.html?event=${encodeURIComponent(event.name)}" class="register-btn">Register Now</a>`
                        : '<p style="margin-top: 15px; opacity: 0.7; text-align: center;">No registration required</p>'
                    }
                </div>
            `).join('') + '</div>';
        }

        function formatDate(dateString) {
            if (!dateString) return '';
            const date = new Date(dateString);
            const options = { year: 'numeric', month: 'long', day: 'numeric' };
            return date.toLocaleDateString('en-US', options);
        }

        function formatTime(timeString) {
            if (!timeString) return '';
            const [hours, minutes] = timeString.split(':');
            const hour = parseInt(hours);
            const ampm = hour >= 12 ? 'PM' : 'AM';
            const displayHour = hour % 12 || 12;
            return `${displayHour}:${minutes} ${ampm}`;
        }

        // Logout functionality
        document.getElementById('logoutBtn').addEventListener('click', function() {
            localStorage.removeItem('currentUserRole');
            localStorage.removeItem('currentUserId');
            localStorage.removeItem('currentUserName');
            localStorage.removeItem('currentUserEmail');
            window.location.href = 'student-login.html';
        });

        // Load events on page load
        loadEvents();
    </script>

</body>
</html>
