<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact Us</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(
                rgba(0,0,0,0.6),
                rgba(0,0,0,0.6)
            ),
            url('https://images.unsplash.com/photo-1521791136064-7986c2920216') no-repeat center/cover;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
        }

        /* Contact Card */
        .contact-container {
            width: 100%;
            max-width: 420px;
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 35px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        h1 {
            margin-bottom: 20px;
            font-size: 2.2rem;
        }

        .contact-info {
            margin-bottom: 25px;
        }

        .contact-info p {
            margin: 10px 0;
            font-size: 1.05rem;
            opacity: 0.9;
        }

        /* Back Button */
        .back-btn {
            display: inline-block;
            padding: 10px 20px;
            background: #00c6ff;
            color: #000;
            text-decoration: none;
            border-radius: 20px;
            font-weight: 600;
            transition: 0.3s;
        }

        .back-btn:hover {
            background: #fff;
        }

        /* Responsive */
        @media (max-width: 500px) {
            .contact-container {
                margin: 20px;
                padding: 25px;
            }
        }
    </style>
</head>

<body>

    <div class="contact-container">
        <h1>Contact Us</h1>

        <div class="contact-info">
            <p>📧 events@college.edu</p>
            <p>📞 9876543210</p>
        </div>

        <a href="index.html" class="back-btn">← Back to Home</a>
    </div>

</body>
</html>
