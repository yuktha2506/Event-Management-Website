<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Organizer Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(
                rgba(0,0,0,0.6),
                rgba(0,0,0,0.6)
            ),
            url('https://images.unsplash.com/photo-1540575467063-178a50c2df87') no-repeat center/cover;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
        }

        .card {
            width: 100%;
            max-width: 420px;
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 35px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        h1 {
            text-align: center;
            margin-bottom: 10px;
            font-size: 2rem;
        }

        p.subtitle {
            text-align: center;
            margin-bottom: 25px;
            font-size: 0.95rem;
            opacity: 0.9;
        }

        label {
            font-size: 0.9rem;
            margin-bottom: 5px;
            display: block;
            opacity: 0.9;
        }

        input {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            margin-bottom: 18px;
            outline: none;
            font-size: 0.95rem;
            background: rgba(255, 255, 255, 0.9);
        }

        .btn-primary {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: #00c6ff;
            color: #000;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            margin-bottom: 10px;
        }

        .btn-primary:hover {
            background: #fff;
        }

        .links {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
        }

        .links a {
            color: #00c6ff;
            text-decoration: none;
        }

        .links a:hover {
            text-decoration: underline;
        }

        .back-home {
            display: block;
            text-align: center;
            margin-top: 18px;
            font-size: 0.9rem;
            color: #fff;
            text-decoration: none;
            opacity: 0.85;
        }

        .back-home:hover {
            text-decoration: underline;
        }

        @media (max-width: 500px) {
            .card {
                margin: 20px;
                padding: 25px;
            }
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Organizer Login</h1>
        <p class="subtitle">Login to create and manage official college events.</p>

        <form id="organizer-login-form">
            <label>Official Email</label>
            <input type="email" placeholder="head@college.edu" required>

            <label>Password</label>
            <input type="password" placeholder="Enter your password" required>

            <button class="btn-primary" type="submit">Login</button>
        </form>

        <div class="links">
            <a href="organizer-signup.html">New organizer? Sign up</a>
            <a href="forgot-password.html">Forgot password?</a>
        </div>

        <a href="index.html" class="back-home">← Back to Home</a>
    </div>

    <script>
        document.getElementById('organizer-login-form').addEventListener('submit', function (e) {
            e.preventDefault();
            
            const form = e.target;
            const email = form.querySelector('input[type="email"]').value;
            const password = form.querySelector('input[type="password"]').value;

            // Show loading state
            const submitBtn = form.querySelector('button[type="submit"]');
            const originalText = submitBtn.textContent;
            submitBtn.textContent = 'Logging in...';
            submitBtn.disabled = true;

            // Try backend first, fallback to localStorage
            // Inside the login-form submit listener
fetch('/api/login', { // Changed from 'api/login.php'
    method: 'POST',
    headers: {
        'Content-Type': 'application/json',
    },
    body: JSON.stringify({
        email: email,
        password: password,
        role: 'organizer' // Or 'student' depending on the file
    })
})
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    // Store user info in localStorage
                    localStorage.setItem('currentUserRole', 'organizer');
                    localStorage.setItem('currentUserId', data.user.id);
                    localStorage.setItem('currentUserName', data.user.name);
                    localStorage.setItem('currentUserEmail', data.user.email);
                    
                    // Redirect to organizer dashboard
                    window.location.href = 'organizer-dashboard.html';
                } else {
                    alert('Login failed: ' + data.message);
                    submitBtn.textContent = originalText;
                    submitBtn.disabled = false;
                }
            })
            .catch(error => {
                // Fallback to localStorage for demo
                console.log('Backend not available, using localStorage');
                localStorage.setItem('currentUserRole', 'organizer');
                localStorage.setItem('currentUserEmail', email);
                window.location.href = 'organizer-dashboard.html';
            });
        });
    </script>

</body>
</html>
