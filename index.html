<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>College Event Management</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(
                rgba(0,0,0,0.6),
                rgba(0,0,0,0.6)
            ),
            url('https://images.unsplash.com/photo-1503676260728-1c00da094a0b')
            no-repeat center center/cover;
            color: #fff;
        }

        /* Navbar */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(6px);
        }

        .nav-links {
            display: flex;
            gap: 30px;
            margin: 0 auto;
        }

        nav a {
            color: #fff;
            text-decoration: none;
            font-weight: 500;
            padding: 8px 16px;
            border-radius: 20px;
            transition: 0.3s;
        }

        nav a:hover {
            background: #00c6ff;
            color: #000;
        }

        .logout-btn {
            background: #ff4444;
            color: #fff;
            padding: 8px 16px;
            border-radius: 20px;
            text-decoration: none;
            font-weight: 500;
            cursor: pointer;
            border: none;
            transition: 0.3s;
        }

        .logout-btn:hover {
            background: #ff0000;
        }

        /* Main Content */
        .container {
            max-width: 750px;
            margin: 100px auto;
            padding: 45px;
            background: rgba(255, 255, 255, 0.12);
            border-radius: 25px;
            text-align: center;
            backdrop-filter: blur(12px);
            box-shadow: 0 10px 35px rgba(0,0,0,0.35);
        }

        .container h1 {
            font-size: 2.6rem;
            margin-bottom: 15px;
        }

        .container p {
            font-size: 1.1rem;
            margin-bottom: 30px;
            opacity: 0.9;
        }

        .container h2 {
            margin-bottom: 15px;
            font-weight: 600;
        }

        /* Event Tags */
        .events span {
            display: inline-block;
            background: #00c6ff;
            color: #000;
            padding: 10px 18px;
            margin: 8px;
            border-radius: 20px;
            font-size: 0.95rem;
            font-weight: 500;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .container {
                margin: 50px 20px;
                padding: 30px;
            }

            .container h1 {
                font-size: 2.1rem;
            }
        }
    </style>
</head>

<body>

    <nav>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="student-signup.html">Register</a>
            <a href="contact.html">Contact</a>
        </div>
        <button class="logout-btn" id="logoutBtn" style="display:none;">Logout</button>
    </nav>

    <div class="container">
        <h1>College Event Management System</h1>
        <p>Manage and register for college events easily</p>

        <h2>Upcoming Events</h2>
        <div class="events">
            <span>Technical</span>
            <span>Cultural</span>
            <span>Sports</span>
        </div>
        
        <div style="margin-top: 30px;">
            <a href="student-dashboard.html" style="display: inline-block; padding: 12px 30px; background: #00c6ff; color: #000; text-decoration: none; border-radius: 25px; font-weight: 600; margin: 10px;">View All Events</a>
            <a href="login.html" style="display: inline-block; padding: 12px 30px; background: rgba(255,255,255,0.2); color: #fff; text-decoration: none; border-radius: 25px; font-weight: 600; margin: 10px;">Login</a>
        </div>
    </div>

    <script>
        // Check if user is logged in
        const userRole = localStorage.getItem('currentUserRole');
        if (userRole === 'student') {
            document.getElementById('logoutBtn').style.display = 'inline-block';
            // Update nav links
            const navLinks = document.querySelector('.nav-links');
            navLinks.innerHTML = '<a href="index.html">Home</a><a href="student-dashboard.html">Dashboard</a><a href="events.html">Events</a><a href="contact.html">Contact</a>';
        } else if (userRole === 'organizer') {
            document.getElementById('logoutBtn').style.display = 'inline-block';
            // Update nav links
            const navLinks = document.querySelector('.nav-links');
            navLinks.innerHTML = '<a href="index.html">Home</a><a href="organizer-dashboard.html">Dashboard</a><a href="contact.html">Contact</a>';
        }

        // Logout functionality
        document.getElementById('logoutBtn').addEventListener('click', function() {
            localStorage.removeItem('currentUserRole');
            localStorage.removeItem('currentUserId');
            localStorage.removeItem('currentUserName');
            localStorage.removeItem('currentUserEmail');
            window.location.href = 'login.html';
        });
    </script>

</body>
</html>
