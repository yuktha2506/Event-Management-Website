<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Reset Password</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(
                rgba(0,0,0,0.6),
                rgba(0,0,0,0.6)
            ),
            url('https://images.unsplash.com/photo-1523580846011-d3a5bc25702b') no-repeat center/cover;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
        }

        .card {
            width: 100%;
            max-width: 420px;
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 35px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        h1 {
            text-align: center;
            margin-bottom: 10px;
            font-size: 2rem;
        }

        p.subtitle {
            text-align: center;
            margin-bottom: 25px;
            font-size: 0.95rem;
            opacity: 0.9;
        }

        label {
            font-size: 0.9rem;
            margin-bottom: 5px;
            display: block;
            opacity: 0.9;
        }

        input {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            margin-bottom: 18px;
            outline: none;
            font-size: 0.95rem;
            background: rgba(255, 255, 255, 0.9);
        }

        .btn-primary {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: #00c6ff;
            color: #000;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            margin-bottom: 10px;
        }

        .btn-primary:hover {
            background: #fff;
        }

        .back-home {
            display: block;
            text-align: center;
            margin-top: 8px;
            font-size: 0.9rem;
            color: #fff;
            text-decoration: none;
            opacity: 0.85;
        }

        .back-home:hover {
            text-decoration: underline;
        }

        .message {
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 18px;
            text-align: center;
            font-size: 0.9rem;
        }

        .message.success {
            background: rgba(0, 255, 0, 0.2);
            color: #90ee90;
        }

        .message.error {
            background: rgba(255, 0, 0, 0.2);
            color: #ffcccc;
        }

        @media (max-width: 500px) {
            .card {
                margin: 20px;
                padding: 25px;
            }
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Reset Password</h1>
        <p class="subtitle">Enter your new password</p>

        <div id="message"></div>

        <form id="reset-password-form">
            <label>New Password</label>
            <input type="password" id="password" placeholder="Enter new password" required minlength="6">

            <label>Confirm Password</label>
            <input type="password" id="confirmPassword" placeholder="Confirm new password" required minlength="6">

            <button class="btn-primary" type="submit">Reset Password</button>
        </form>

        <a href="index.html" class="back-home">← Back to Home</a>
    </div>

    <script>
        // Get token from URL
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        if (!token) {
            document.getElementById('message').innerHTML = '<div class="message error">Invalid reset link. Please request a new password reset.</div>';
            document.getElementById('reset-password-form').style.display = 'none';
        }

        document.getElementById('reset-password-form').addEventListener('submit', function (e) {
            e.preventDefault();

            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (password !== confirmPassword) {
                document.getElementById('message').innerHTML = '<div class="message error">Passwords do not match!</div>';
                return;
            }

            if (password.length < 6) {
                document.getElementById('message').innerHTML = '<div class="message error">Password must be at least 6 characters long!</div>';
                return;
            }

            // Send reset request to backend
            fetch('api/reset_password.php', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    token: token,
                    password: password
                })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    document.getElementById('message').innerHTML = '<div class="message success">Password reset successfully! Redirecting to login...</div>';
                    document.getElementById('reset-password-form').style.display = 'none';
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 2000);
                } else {
                    document.getElementById('message').innerHTML = '<div class="message error">' + data.message + '</div>';
                }
            })
            .catch(error => {
                document.getElementById('message').innerHTML = '<div class="message error">Error resetting password. Please try again.</div>';
            });
        });
    </script>

</body>
</html>
